name: Bug report
description: Report a problem with the EVCC Card
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug!

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: 2026.3.0
    validations:
      required: true

  - type: input
    id: card_version
    attributes:
      label: EVCC Card version
      placeholder: v1.2.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the problem
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: yaml
    attributes:
      label: Lovelace configuration
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Browser console errors
      render: shell

  - type: textarea
    id: debug_report
    attributes:
      label: Debug report
      description: |
        Switch the card to `mode: debug` (visual editor → Mode → "Debug / Diagnostics") and click **Copy report**. Paste the result here. This greatly speeds up triage for discovery / "no entities" issues.
      render: markdown